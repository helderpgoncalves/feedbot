name: ✨ Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Describe the use case before the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Affects
      multiple: true
      options:
        - feedbot-api
        - feedbot-bot
        - feedbot-mcp
        - feedbot-core
        - dashboard / UX
        - docs
