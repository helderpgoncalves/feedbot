name: 🐛 Bug report
description: Something isn't working as expected.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug — please fill in as much as you can.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD`, or the release tag.
      placeholder: e.g. abc1234 or v0.1.0
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - feedbot-api
        - feedbot-bot
        - feedbot-mcp
        - feedbot-core
        - infra / docker
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `docker compose up -d db api`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 14.5, Docker 25.0.3, Python 3.12.2
