name: ci
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # Install feedbot-core first; the other packages depend on it.
          pip install -e packages/feedbot-core
          pip install -e packages/feedbot-api
          pip install -e packages/feedbot-bot
          pip install -e packages/feedbot-mcp
      - name: Lint
        run: ruff check packages/
      - name: Import smoke test
        run: python -c "import feedbot_core, feedbot_api, feedbot_bot, feedbot_mcp"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (feedbot-core first; api carries the test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/feedbot-core
          pip install -e "packages/feedbot-api[test]"
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          echo "Postgres did not come up in time" >&2
          exit 1
        shell: bash
      - name: Run pytest
        env:
          FEEDBOT_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/feedbot_test
          FEEDBOT_TEST_DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest packages/feedbot-api/tests -v

  # Build all three images, multi-arch (amd64+arm64). On main pushes
  # and version tags, also push to GHCR for the installer to consume.
  # PRs do build-only (no push) to validate Dockerfiles.
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api, file: packages/feedbot-api/Dockerfile }
          - { name: web, file: apps/web/Dockerfile,            context: apps/web }
          - { name: bot, file: packages/feedbot-bot/Dockerfile }
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner build arm64 images.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # Skipped on PRs from forks (no GHCR access). Build still runs.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Computes the tag set per image.
      #   - main pushes:  :latest, :main, :sha-<short>
      #   - version tags: :vX.Y.Z, :vX.Y, :vX, :latest
      #   - PRs:          :pr-<number> (built but not pushed)
      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/helderpgoncalves/feedbot-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short

      - name: Build and (on main / tag) push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.file }}
          # Push only on pushes to main or version tags. PRs build-only.
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted cache shaves ~50% off subsequent builds.
          cache-from: type=gha,scope=feedbot-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=feedbot-${{ matrix.name }}
          # Bake the commit SHA into the web build (read by the SPA at runtime).
          build-args: |
            BUILD_SHA=${{ github.sha }}

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
