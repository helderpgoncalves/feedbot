name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # Install feedbot-core first; the other packages depend on it.
          pip install -e packages/feedbot-core
          pip install -e packages/feedbot-api
          pip install -e packages/feedbot-bot
          pip install -e packages/feedbot-mcp
      - name: Lint
        run: ruff check packages/
      - name: Import smoke test
        run: python -c "import feedbot_core, feedbot_api, feedbot_bot, feedbot_mcp"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (feedbot-core first; api carries the test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/feedbot-core
          pip install -e "packages/feedbot-api[test]"
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          echo "Postgres did not come up in time" >&2
          exit 1
        shell: bash
      - name: Run pytest
        env:
          FEEDBOT_TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/feedbot_test
          FEEDBOT_TEST_DATABASE_ADMIN_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest packages/feedbot-api/tests -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/feedbot-api/Dockerfile
          push: false
          tags: feedbot-api:ci
      - name: Build bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/feedbot-bot/Dockerfile
          push: false
          tags: feedbot-bot:ci

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
