# ─────────────────────────────────────────────────────────────────────
# Feedbot — full cloud stack (one `docker compose up`, three domains).
#
# Designed to work on ANY self-hosting platform with zero
# platform-specific labels:
#   • Coolify  (point all three FQDNs at the `web` service)
#   • Dokploy  (same)
#   • Plain Docker behind nginx-proxy-manager / Traefik / Caddy
#   • Kubernetes / Nomad / fly.io (point ingress at the `web` service)
#
# Topology — one nginx edge does Host-routing for the three public
# domains, then path-routes inside `app.<host>` between SPA and API:
#
#   <platform-edge>
#       │
#       ▼  Host:
#   web (nginx edge, port 80)
#       ├── feedbot.dev      → marketing  (Astro static)
#       ├── app.feedbot.dev  → spa        (React static, served by nginx)
#       │   ├── /api/*       → api        (FastAPI + MCP)
#       │   ├── /mcp/*       → api
#       │   └── /healthz     → api
#       └── get.feedbot.dev  → installer  (install.sh + index.html)
#
#   plus:
#       db  (postgres) — only reachable inside the compose network
#       bot (Telegram) — opt-in via the `bot` compose profile
#
# WHY THIS LAYOUT
#   1. One platform service to expose (`web`). Coolify/Dokploy/etc.
#      see one HTTP service on port 80; you point all three FQDNs at
#      it and the platform's edge proxy handles TLS termination.
#   2. Three image roles (marketing, spa, installer) all run nginx
#      so operators learn one config language across the stack.
#   3. The bot is the only container that egresses to the internet
#      (Telegram) and is opt-in.
#
# DEPLOY (Coolify / Dokploy)
#   1. Point your platform at this repo, branch main.
#   2. Pick `docker-compose.cloud.yml` as the compose file.
#   3. Set the env vars in REQUIRED ENV VARS below.
#   4. On the `web` service, add THREE domains: feedbot.dev,
#      app.feedbot.dev, get.feedbot.dev. The platform issues one
#      Let's Encrypt cert per FQDN and routes traffic to web:80.
#   5. Deploy. First boot pulls the registry images and (for
#      marketing/installer) builds them locally from this repo.
#
# DEPLOY (plain VM with docker)
#   The compose has no TLS by itself — terminate TLS in front of
#   `web:80`. Easiest options:
#       • nginx-proxy-manager  (UI, includes Let's Encrypt)
#       • caddy reverse_proxy  (one-line per FQDN)
#       • cloudflared tunnel   (no public IP needed)
#   See docs/DEPLOY-COOLIFY.md for the full walk-through.
#
# REQUIRED ENV VARS
#   FEEDBOT_SECRET_KEY      48-byte base64; rotate via `feedbot rotate-secret-key`.
#   FEEDBOT_BOT_TOKEN       32-byte base64; bot↔api shared secret.
#   FEEDBOT_DB_PASSWORD     Postgres password.
#   FEEDBOT_BASE_URL        e.g. https://app.feedbot.dev
#   FEEDBOT_PUBLIC_URL      same as FEEDBOT_BASE_URL (browser-visible).
#   FEEDBOT_MARKETING_HOST  e.g. feedbot.dev       (default in compose)
#   FEEDBOT_APP_HOST        e.g. app.feedbot.dev   (default in compose)
#   FEEDBOT_INSTALLER_HOST  e.g. get.feedbot.dev   (default in compose)
#
# OPTIONAL ENV VARS
#   FEEDBOT_VERSION                image tag for spa/api/bot (default: latest)
#   EMAIL_BACKEND=smtp + SMTP_*    for magic-link delivery
#   FEEDBOT_TELEGRAM_BOT_TOKEN     to enable the bot (also `--profile bot`)
#   FEEDBOT_BILLING_ENABLED        flip to true for commercial GA
#   FEEDBOT_STRIPE_*               required when billing is on (see C2 docs)
# ─────────────────────────────────────────────────────────────────────

name: feedbot

x-defaults: &defaults
  restart: unless-stopped
  init: true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  # No `networks:` block. Coolify (and most managed-compose platforms)
  # creates an isolated network per stack and joins every service to
  # it automatically. Defining a custom network here makes containers
  # multi-homed, and Coolify's Traefik then non-deterministically picks
  # the wrong IP and 504s. See coollabsio/coolify#4483, #6215.

services:
  # ── Edge: the only public-facing service ─────────────────────────
  # Coolify / Dokploy detect SERVICE_FQDN_WEB_80 and auto-generate
  # the proxy + TLS config to forward the public domain to web:80.
  # On other platforms, point the ingress at this service's port 80.
  #
  # The service is named `web` (not `proxy`) because that's the name
  # most self-hosting UIs surface as "the public app" — keeping it
  # familiar avoids confusion when a user looks for a Domain field.
  web:
    <<: *defaults
    # nginx:alpine exposes ONLY port 80 — eliminates the multi-port
    # auto-discovery problem that caddy:2-alpine (80/443/2019) caused
    # under Coolify Traefik. Single exposed port = unambiguous backend.
    image: nginx:alpine
    environment:
      FEEDBOT_MARKETING_HOST: ${FEEDBOT_MARKETING_HOST:-feedbot.dev}
      FEEDBOT_APP_HOST: ${FEEDBOT_APP_HOST:-app.feedbot.dev}
      FEEDBOT_INSTALLER_HOST: ${FEEDBOT_INSTALLER_HOST:-get.feedbot.dev}
    # nginx config is written from the entrypoint via heredoc — works
    # on every container platform without bind mounts or compose-spec
    # configs (both of which Coolify's raw-compose path doesn't fully
    # support). One artifact, runs anywhere.
    #
    # Host-routing: one nginx, three domains, three upstream services.
    # `default_server` catches anything that isn't one of the three
    # configured domains and returns 404 — so a stray *.example.com
    # CNAME doesn't accidentally serve content.
    command:
      - sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<NGINX
        upstream feedbot_api       { server api:8000; }
        upstream feedbot_spa       { server spa:80; }
        upstream feedbot_marketing { server marketing:80; }
        upstream feedbot_installer { server installer:80; }

        # Headers shared across every public vhost.
        map \$$http_user_agent \$$is_shell_client {
            default      0;
            "~*curl"     1;
            "~*wget"     1;
            "~*fetch"    1;
        }

        # Catch-all for unrecognised Host headers.
        server {
          listen 80 default_server;
          server_name _;
          return 404;
        }

        # ── feedbot.dev — marketing site ─────────────────────────────
        server {
          listen 80;
          server_name ${FEEDBOT_MARKETING_HOST:-feedbot.dev};

          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "DENY" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
            proxy_pass http://feedbot_marketing;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
            proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$$scheme;
          }
        }

        # ── app.feedbot.dev — cloud SaaS (SPA + API + MCP) ───────────
        server {
          listen 80;
          server_name ${FEEDBOT_APP_HOST:-app.feedbot.dev};

          gzip on;
          gzip_types text/plain text/css application/javascript application/json image/svg+xml;
          gzip_min_length 1024;

          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "DENY" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=(), geolocation=()" always;
          add_header Cross-Origin-Opener-Policy "same-origin" always;

          # /api/* -> api, with /api stripped
          location /api/ {
            rewrite ^/api/(.*)\$$ /\$$1 break;
            proxy_pass http://feedbot_api;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
            proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$$scheme;
          }

          # /mcp, /mcp/* -> api, path-preserving
          location /mcp  { proxy_pass http://feedbot_api; }
          location /mcp/ { proxy_pass http://feedbot_api; proxy_http_version 1.1; proxy_set_header Connection ""; }

          # /healthz -> api
          location = /healthz { proxy_pass http://feedbot_api; }

          # everything else -> SPA (config.json, static, react routes)
          location / {
            proxy_pass http://feedbot_spa;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
            proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$$scheme;
          }
        }

        # ── get.feedbot.dev — installer one-liner ────────────────────
        # The installer container itself rewrites curl/wget User-Agents
        # to /install.sh, so the edge just proxies through verbatim.
        server {
          listen 80;
          server_name ${FEEDBOT_INSTALLER_HOST:-get.feedbot.dev};

          add_header X-Content-Type-Options "nosniff" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;

          location / {
            proxy_pass http://feedbot_installer;
            proxy_set_header Host \$$host;
            proxy_set_header User-Agent \$$http_user_agent;
            proxy_set_header X-Real-IP \$$remote_addr;
            proxy_set_header X-Forwarded-For \$$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$$scheme;
          }
        }
        NGINX
        exec nginx -g 'daemon off;'
    depends_on:
      api:
        condition: service_started
      spa:
        condition: service_started
      marketing:
        condition: service_started
      installer:
        condition: service_started

  spa:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-web:${FEEDBOT_VERSION:-latest}
    # Force a registry pull on every `compose up`. Coolify's
    # auto-redeploy reuses the locally cached :latest otherwise, so a
    # newly published image silently never reaches the running stack.
    pull_policy: always
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "spa"
    environment:
      FEEDBOT_PRODUCT_NAME: ${FEEDBOT_PRODUCT_NAME:-Feedbot}
      FEEDBOT_PUBLIC_URL: ${FEEDBOT_PUBLIC_URL}
      FEEDBOT_MCP_PUBLIC_URL: ${FEEDBOT_MCP_PUBLIC_URL:-}
      FEEDBOT_TELEGRAM_BOT_USERNAME: ${FEEDBOT_TELEGRAM_BOT_USERNAME:-}
      FEEDBOT_ALLOW_SIGNUP: ${FEEDBOT_ALLOW_SIGNUP:-true}
      FEEDBOT_BILLING_ENABLED: ${FEEDBOT_BILLING_ENABLED:-false}
      FEEDBOT_DEPLOYMENT: cloud
      FEEDBOT_BUILD_SHA: ${FEEDBOT_BUILD_SHA:-}
    depends_on:
      api:
        condition: service_started

  api:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-api:${FEEDBOT_VERSION:-latest}
    pull_policy: always
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "api"
    environment:
      DATABASE_URL: "postgresql+asyncpg://feedbot:${FEEDBOT_DB_PASSWORD}@db:5432/feedbot"
      FEEDBOT_BASE_URL: ${FEEDBOT_BASE_URL}
      FEEDBOT_SECRET_KEY: ${FEEDBOT_SECRET_KEY}
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      FEEDBOT_DEPLOYMENT: cloud
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    <<: *defaults
    image: postgres:16-alpine
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "db"
    environment:
      POSTGRES_USER: feedbot
      POSTGRES_PASSWORD: ${FEEDBOT_DB_PASSWORD}
      POSTGRES_DB: feedbot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Marketing site (feedbot.dev) ─────────────────────────────────
  # Built from apps/marketing/. Astro+Starlight bundle baked into an
  # nginx:alpine image that serves dist/ on port 80.
  marketing:
    <<: *defaults
    build:
      context: ./apps/marketing
      dockerfile: Dockerfile
    image: feedbot-marketing:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "marketing"

  # ── Installer host (get.feedbot.dev) ─────────────────────────────
  # Builds install.sh + index.html from this repo. nginx maps the
  # User-Agent so curl/wget always receive the shell script.
  installer:
    <<: *defaults
    build:
      # Build context is the repo root — apps/installer-host/build.sh
      # needs `install.sh` from there to produce the static bundle.
      context: .
      dockerfile: apps/installer-host/Dockerfile
    image: feedbot-installer:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "installer"

  # Bot stays opt-in. To enable: set FEEDBOT_TELEGRAM_BOT_TOKEN in the
  # platform env vars and activate the `bot` compose profile.
  bot:
    <<: *defaults
    profiles: ["bot"]
    image: ghcr.io/helderpgoncalves/feedbot-bot:${FEEDBOT_VERSION:-latest}
    pull_policy: always
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "bot"
    environment:
      FEEDBOT_API_URL: "http://api:8000"
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      api:
        condition: service_started

volumes:
  db_data:
