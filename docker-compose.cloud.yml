# ─────────────────────────────────────────────────────────────────────
# Feedbot — cloud deployment compose.
#
# Designed to work on ANY self-hosting platform with zero
# platform-specific labels:
#   • Coolify  (uses SERVICE_FQDN_WEB_80 magic var below)
#   • Dokploy  (same magic var convention)
#   • Plain Docker behind nginx-proxy-manager / Traefik / Caddy
#   • Kubernetes / Nomad / fly.io (point ingress at the `web` service)
#
# Topology — identical to the self-host stack:
#
#   <platform-edge> → web (caddy edge) → spa (nginx, static SPA)
#                                      → api (FastAPI + MCP)
#                                      → bot (Telegram, opt-in)
#                                      → db  (postgres)
#
# The `web` service is a small caddy that does same-origin path
# routing (/api, /mcp, /healthz → api; everything else → spa). The
# platform's edge proxy terminates TLS and forwards plain HTTP to it
# on port 80, so the same caddy config powers both self-host (caddy
# does TLS too) and cloud (platform does TLS).
#
# WHY THIS LAYOUT
#   1. Zero coupling to the host's reverse proxy. No Traefik labels,
#      no Caddy directives leaked into the compose. The platform sees
#      one HTTP service (`web`) on port 80.
#   2. Path routing lives in caddy/Caddyfile.cloud — one source of
#      truth, the self-host caddy/Caddyfile mirrors it.
#   3. The bot is the only container that talks to the outside world
#      (Telegram), and it's opt-in via profile.
#
# DEPLOY
#   1. Point your platform at this repo, branch main.
#   2. Pick `docker-compose.cloud.yml` as the compose file.
#   3. Set the env vars in REQUIRED ENV VARS below.
#   4. On Coolify / Dokploy: set the public domain on the `web`
#      service. Magic-var platforms auto-issue a Let's Encrypt cert
#      and route traffic to web:80.
#   5. Deploy.
#
# REQUIRED ENV VARS
#   FEEDBOT_SECRET_KEY      48-byte base64; rotate via `feedbot rotate-secret-key`.
#   FEEDBOT_BOT_TOKEN       32-byte base64; bot↔api shared secret.
#   FEEDBOT_DB_PASSWORD     Postgres password.
#   FEEDBOT_BASE_URL        e.g. https://app.feedbot.dev
#   FEEDBOT_PUBLIC_URL      same as FEEDBOT_BASE_URL (browser-visible).
#
# OPTIONAL ENV VARS
#   FEEDBOT_VERSION         image tag (default: latest)
#   EMAIL_BACKEND=smtp + SMTP_*  for magic-link delivery
#   FEEDBOT_TELEGRAM_BOT_TOKEN   to enable the bot (also activate the
#                                `bot` profile in your platform).
# ─────────────────────────────────────────────────────────────────────

name: feedbot

x-defaults: &defaults
  restart: unless-stopped
  init: true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  # No `networks:` block. Coolify (and most managed-compose platforms)
  # creates an isolated network per stack and joins every service to
  # it automatically. Defining a custom network here makes containers
  # multi-homed, and Coolify's Traefik then non-deterministically picks
  # the wrong IP and 504s. See coollabsio/coolify#4483, #6215.

services:
  # ── Edge: the only public-facing service ─────────────────────────
  # Coolify / Dokploy detect SERVICE_FQDN_WEB_80 and auto-generate
  # the proxy + TLS config to forward the public domain to web:80.
  # On other platforms, point the ingress at this service's port 80.
  #
  # The service is named `web` (not `proxy`) because that's the name
  # most self-hosting UIs surface as "the public app" — keeping it
  # familiar avoids confusion when a user looks for a Domain field.
  web:
    <<: *defaults
    # nginx:alpine exposes ONLY port 80 — eliminates the multi-port
    # auto-discovery problem that caddy:2-alpine (80/443/2019) caused
    # under Coolify Traefik. Single exposed port = unambiguous backend.
    image: nginx:alpine
    # nginx config is written from the entrypoint via heredoc — works
    # on every container platform without bind mounts or compose-spec
    # configs (both of which Coolify's raw-compose path doesn't fully
    # support). One artifact, runs anywhere.
    command:
      - sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        upstream feedbot_api { server api:8000; }
        upstream feedbot_spa { server spa:80; }

        server {
          listen 80 default_server;
          server_name _;

          gzip on;
          gzip_types text/plain text/css application/javascript application/json image/svg+xml;
          gzip_min_length 1024;

          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "DENY" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          add_header Permissions-Policy "interest-cohort=(), camera=(), microphone=(), geolocation=()" always;
          add_header Cross-Origin-Opener-Policy "same-origin" always;

          # /api/* -> api, with /api stripped
          location /api/ {
            rewrite ^/api/(.*)$$ /$$1 break;
            proxy_pass http://feedbot_api;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }

          # /mcp, /mcp/* -> api, path-preserving
          location /mcp  { proxy_pass http://feedbot_api; }
          location /mcp/ { proxy_pass http://feedbot_api; proxy_http_version 1.1; proxy_set_header Connection ""; }

          # /healthz -> api
          location = /healthz { proxy_pass http://feedbot_api; }

          # everything else -> SPA
          location / {
            proxy_pass http://feedbot_spa;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
            proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $$scheme;
          }
        }
        NGINX
        exec nginx -g 'daemon off;'
    depends_on:
      api:
        condition: service_started
      spa:
        condition: service_started

  spa:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-web:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "spa"
    environment:
      FEEDBOT_PRODUCT_NAME: ${FEEDBOT_PRODUCT_NAME:-Feedbot}
      FEEDBOT_PUBLIC_URL: ${FEEDBOT_PUBLIC_URL}
      FEEDBOT_MCP_PUBLIC_URL: ${FEEDBOT_MCP_PUBLIC_URL:-}
      FEEDBOT_TELEGRAM_BOT_USERNAME: ${FEEDBOT_TELEGRAM_BOT_USERNAME:-}
      FEEDBOT_ALLOW_SIGNUP: ${FEEDBOT_ALLOW_SIGNUP:-true}
      FEEDBOT_BILLING_ENABLED: ${FEEDBOT_BILLING_ENABLED:-false}
      FEEDBOT_DEPLOYMENT: cloud
      FEEDBOT_BUILD_SHA: ${FEEDBOT_BUILD_SHA:-}
    depends_on:
      api:
        condition: service_started

  api:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-api:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "api"
    environment:
      DATABASE_URL: "postgresql+asyncpg://feedbot:${FEEDBOT_DB_PASSWORD}@db:5432/feedbot"
      FEEDBOT_BASE_URL: ${FEEDBOT_BASE_URL}
      FEEDBOT_SECRET_KEY: ${FEEDBOT_SECRET_KEY}
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      FEEDBOT_DEPLOYMENT: cloud
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    <<: *defaults
    image: postgres:16-alpine
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "db"
    environment:
      POSTGRES_USER: feedbot
      POSTGRES_PASSWORD: ${FEEDBOT_DB_PASSWORD}
      POSTGRES_DB: feedbot
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Bot stays opt-in. To enable: set FEEDBOT_TELEGRAM_BOT_TOKEN in the
  # platform env vars and activate the `bot` compose profile.
  bot:
    <<: *defaults
    profiles: ["bot"]
    image: ghcr.io/helderpgoncalves/feedbot-bot:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "bot"
    environment:
      FEEDBOT_API_URL: "http://api:8000"
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      api:
        condition: service_started

volumes:
  db_data:
