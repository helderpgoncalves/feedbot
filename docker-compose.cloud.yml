# ─────────────────────────────────────────────────────────────────────
# Feedbot — cloud deployment compose for Coolify.
#
# Differs from the self-host docker-compose.yml in three ways:
#
#   1. No internal `caddy` service. Coolify's Traefik handles TLS +
#      routing for app.feedbot.dev directly to web/api below.
#   2. Traefik labels on every public-facing service so Coolify
#      auto-issues a Let's Encrypt cert for app.feedbot.dev.
#   3. FEEDBOT_DEPLOYMENT=cloud — hides the Settings → System UI
#      since cloud operators don't have host access to drive the
#      orchestrator anyway.
#
# Usage in Coolify:
#   1. Create an Application → Source: Git Repository → this repo,
#      branch main.
#   2. Build pack: Docker Compose. Compose file: docker-compose.cloud.yml.
#   3. Set the env vars listed in the "REQUIRED ENV VARS" section
#      below (FEEDBOT_SECRET_KEY, FEEDBOT_BOT_TOKEN, FEEDBOT_DB_PASSWORD,
#      FEEDBOT_BASE_URL, FEEDBOT_PUBLIC_URL).
#   4. Set the public domain to app.feedbot.dev.
#   5. Deploy. Traefik auto-issues the cert.
#
# REQUIRED ENV VARS (set in Coolify's Application → Environment):
#   FEEDBOT_SECRET_KEY      48-byte base64; rotate via `feedbot rotate-secret-key`.
#   FEEDBOT_BOT_TOKEN       32-byte base64; bot↔api shared secret.
#   FEEDBOT_DB_PASSWORD     Postgres password.
#   FEEDBOT_BASE_URL        https://app.feedbot.dev
#   FEEDBOT_PUBLIC_URL      https://app.feedbot.dev
#   FEEDBOT_PUBLIC_DOMAIN   app.feedbot.dev    (used in Traefik Host rules below)
#
# OPTIONAL ENV VARS:
#   EMAIL_BACKEND=smtp + SMTP_*  for magic-link delivery
#   FEEDBOT_TELEMETRY_ENDPOINT   if you ever wire up self-host telemetry
# ─────────────────────────────────────────────────────────────────────

name: feedbot

x-defaults: &defaults
  restart: unless-stopped
  init: true
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - feedbot

services:
  web:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-web:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "web"
      # Traefik (Coolify) routes all non-/api, non-/mcp traffic to nginx.
      # Ordering: api router is matched first via priority below.
      traefik.enable: "true"
      traefik.http.routers.feedbot-web.rule: "Host(`${FEEDBOT_PUBLIC_DOMAIN}`)"
      traefik.http.routers.feedbot-web.entrypoints: "websecure"
      traefik.http.routers.feedbot-web.tls: "true"
      traefik.http.routers.feedbot-web.tls.certresolver: "letsencrypt"
      traefik.http.routers.feedbot-web.priority: "1"
      traefik.http.services.feedbot-web.loadbalancer.server.port: "80"
    environment:
      FEEDBOT_PRODUCT_NAME: ${FEEDBOT_PRODUCT_NAME:-Feedbot}
      FEEDBOT_PUBLIC_URL: ${FEEDBOT_PUBLIC_URL}
      FEEDBOT_MCP_PUBLIC_URL: ${FEEDBOT_MCP_PUBLIC_URL:-}
      FEEDBOT_TELEGRAM_BOT_USERNAME: ${FEEDBOT_TELEGRAM_BOT_USERNAME:-}
      FEEDBOT_ALLOW_SIGNUP: ${FEEDBOT_ALLOW_SIGNUP:-true}
      FEEDBOT_BILLING_ENABLED: ${FEEDBOT_BILLING_ENABLED:-false}
      FEEDBOT_DEPLOYMENT: cloud
      FEEDBOT_BUILD_SHA: ${FEEDBOT_BUILD_SHA:-}
    expose: ["80"]
    depends_on:
      api:
        condition: service_started

  api:
    <<: *defaults
    image: ghcr.io/helderpgoncalves/feedbot-api:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "api"
      # Higher priority than web so /api/* and /mcp/* are matched first.
      # PathPrefix in Traefik covers both the bare path and /path/...
      traefik.enable: "true"
      traefik.http.routers.feedbot-api.rule: "Host(`${FEEDBOT_PUBLIC_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/mcp`) || Path(`/healthz`))"
      traefik.http.routers.feedbot-api.entrypoints: "websecure"
      traefik.http.routers.feedbot-api.tls: "true"
      traefik.http.routers.feedbot-api.tls.certresolver: "letsencrypt"
      traefik.http.routers.feedbot-api.priority: "10"
      # Strip /api/ prefix before forwarding to FastAPI (which mounts at /v1/*).
      # /mcp/* and /healthz pass through untouched.
      traefik.http.middlewares.feedbot-api-strip.stripprefix.prefixes: "/api"
      traefik.http.middlewares.feedbot-api-strip.stripprefix.forceslash: "false"
      traefik.http.routers.feedbot-api.middlewares: "feedbot-api-strip"
      traefik.http.services.feedbot-api.loadbalancer.server.port: "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://feedbot:${FEEDBOT_DB_PASSWORD}@db:5432/feedbot"
      FEEDBOT_BASE_URL: ${FEEDBOT_BASE_URL}
      FEEDBOT_SECRET_KEY: ${FEEDBOT_SECRET_KEY}
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      FEEDBOT_DEPLOYMENT: cloud
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    expose: ["8000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    <<: *defaults
    image: postgres:16-alpine
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "db"
    environment:
      POSTGRES_USER: feedbot
      POSTGRES_PASSWORD: ${FEEDBOT_DB_PASSWORD}
      POSTGRES_DB: feedbot
    volumes:
      - db_data:/var/lib/postgresql/data
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Bot stays opt-in. To enable: set FEEDBOT_TELEGRAM_BOT_TOKEN in
  # Coolify env vars and deploy with the `bot` profile activated
  # (Coolify → Application → Compose Profiles → add "bot").
  bot:
    <<: *defaults
    profiles: ["bot"]
    image: ghcr.io/helderpgoncalves/feedbot-bot:${FEEDBOT_VERSION:-latest}
    labels:
      com.feedbot.installer: "true"
      com.feedbot.role: "bot"
    environment:
      FEEDBOT_API_URL: "http://api:8000"
      FEEDBOT_BOT_TOKEN: ${FEEDBOT_BOT_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      api:
        condition: service_started

networks:
  feedbot:
    name: feedbot_net

volumes:
  db_data:
