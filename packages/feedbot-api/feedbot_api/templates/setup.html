{% extends "base.html" %}
{% block title %}Welcome · Feedbot{% endblock %}
{% block content %}
<div class="mx-auto max-w-md space-y-6">
  <div class="space-y-2 text-center">
    <h1 class="text-2xl font-semibold">Welcome to Feedbot</h1>
    <p class="text-sm text-zinc-600">
      Create the owner account for this instance. You'll be able to invite teammates afterwards.
    </p>
  </div>
  <form method="post" action="/setup" class="space-y-3 rounded-lg border border-zinc-200 bg-white p-6">
    <label class="block text-sm">
      <span class="text-zinc-700">Your email</span>
      <input type="email" name="email" required autofocus
             placeholder="you@example.com"
             class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2 text-sm focus:border-zinc-900 focus:outline-none">
    </label>
    <label class="block text-sm">
      <span class="text-zinc-700">Workspace name <span class="text-zinc-400">(optional)</span></span>
      <input type="text" name="tenant_name"
             placeholder="Acme Inc."
             class="mt-1 w-full rounded-md border border-zinc-300 px-3 py-2 text-sm focus:border-zinc-900 focus:outline-none">
    </label>
    <button class="w-full rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800">
      Create owner account
    </button>
  </form>
  <p class="text-center text-xs text-zinc-500">
    This page is only visible until the first user is created.
  </p>
</div>
{% endblock %}
