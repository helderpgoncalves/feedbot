{% extends "base.html" %}
{% block title %}Sign in · Feedbot{% endblock %}
{% block content %}
<div class="mx-auto max-w-md space-y-6">
  <h1 class="text-2xl font-semibold">Sign in</h1>
  <p class="text-sm text-zinc-600">We'll email you a magic link. No password required.</p>
  {% if error %}<div class="rounded border border-red-200 bg-red-50 p-3 text-sm text-red-700">{{ error }}</div>{% endif %}
  <form method="post" action="/login" class="space-y-3">
    <input type="email" name="email" required placeholder="you@team.com"
           class="w-full rounded-md border border-zinc-300 px-3 py-2 text-sm focus:border-zinc-900 focus:outline-none">
    <button class="w-full rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white hover:bg-zinc-800">
      Send magic link
    </button>
  </form>
</div>
{% endblock %}
