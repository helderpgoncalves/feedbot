<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Feedbot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900 antialiased">
  <header class="border-b border-zinc-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center gap-2 font-semibold">
        <span class="inline-block h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
        feedbot
      </a>
      <nav class="flex items-center gap-4 text-sm">
        {% if request.session.get('email') %}
          <a href="/app" class="text-zinc-600 hover:text-zinc-900">Projects</a>
          {% if me is defined and me and me.is_admin %}
            <a href="/app/team" class="text-zinc-600 hover:text-zinc-900">Team</a>
          {% endif %}
          <span class="text-zinc-400">{{ request.session.get('email') }}</span>
          <form action="/logout" method="post" class="inline">
            <button class="text-zinc-600 hover:text-zinc-900">Sign out</button>
          </form>
        {% else %}
          <a href="/login" class="text-zinc-600 hover:text-zinc-900">Sign in</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-6 py-10">{% block content %}{% endblock %}</main>
</body>
</html>
