[project]
name = "feedbot-api"
version = "0.1.0"
description = "JSON API + MCP server for Feedbot. The dashboard lives in apps/web."
requires-python = ">=3.11"
dependencies = [
    "feedbot-core",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "slowapi>=0.1.9",
    "mcp>=1.27",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "asgi-lifespan>=2.1",
    # The conftest creates / drops the test database via a *sync* engine on
    # FEEDBOT_TEST_DATABASE_ADMIN_URL (postgresql://...), which SQLAlchemy
    # routes through psycopg2. Without this the CI runner errors out with
    # `ModuleNotFoundError: psycopg2` before any test executes.
    "psycopg2-binary>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["feedbot_api"]
