[project]
name = "feedbot-mcp"
version = "0.1.0"
description = "MCP server that connects Claude Code to a Feedbot deployment over HTTP."
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[project.scripts]
feedbot-mcp = "feedbot_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["feedbot_mcp"]
