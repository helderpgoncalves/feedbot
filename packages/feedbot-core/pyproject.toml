[project]
name = "feedbot-core"
version = "0.1.0"
description = "Shared models, repositories, and domain primitives for Feedbot."
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "argon2-cffi>=23.1",
    "cryptography>=42",
    "openai>=1.40",
    "anthropic>=0.34",
    # Cloud billing (gated at runtime by FEEDBOT_BILLING_ENABLED). The
    # import is local to feedbot_core.billing.stripe_client and never
    # touched on self-host code paths, but the package is installed
    # everywhere because (a) it has no runtime side effects on import
    # and (b) it keeps the test matrix simple.
    "stripe>=12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["feedbot_core"]
