[project]
name = "feedbot-bot"
version = "0.1.0"
description = "Messaging adapters (Telegram, WhatsApp) that feed Feedbot."
requires-python = ">=3.11"
dependencies = [
    "feedbot-core",
    "python-telegram-bot[ext]>=21.4",
    "httpx>=0.27",
    "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["feedbot_bot"]
