services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedbot
      POSTGRES_PASSWORD: feedbot
      POSTGRES_DB: feedbot
    volumes:
      - db_data:/var/lib/postgresql/data
    # No port published by default to avoid clashing with a host Postgres.
    # Add `-p 5432:5432` via docker-compose.override.yml if you need direct access.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/feedbot-api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feedbot:feedbot@db:5432/feedbot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bot:
    profiles: ["bot"]   # opt-in: docker compose --profile bot up
    build:
      context: .
      dockerfile: packages/feedbot-bot/Dockerfile
    env_file: .env
    environment:
      FEEDBOT_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      # Caddy proxies /api/* /mcp/* /login /setup to this upstream — same origin from the browser.
      FEEDBOT_API_UPSTREAM: http://api:8000
      # Runtime config rendered into /config.json on every request. Edit and restart, no rebuild.
      FEEDBOT_PRODUCT_NAME: ${FEEDBOT_PRODUCT_NAME:-Feedbot}
      FEEDBOT_PUBLIC_URL: ${FEEDBOT_PUBLIC_URL:-http://localhost:3000}
      FEEDBOT_TELEGRAM_BOT_USERNAME: ${FEEDBOT_TELEGRAM_BOT_USERNAME:-}
      FEEDBOT_ALLOW_SIGNUP: ${FEEDBOT_ALLOW_SIGNUP:-false}
      FEEDBOT_DEPLOYMENT: ${FEEDBOT_DEPLOYMENT:-self-host}
      FEEDBOT_BUILD_SHA: ${FEEDBOT_BUILD_SHA:-}
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:
