services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feedbot
      POSTGRES_PASSWORD: feedbot
      POSTGRES_DB: feedbot
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbot"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/feedbot-api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feedbot:feedbot@db:5432/feedbot
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    profiles: ["bot"]   # opt-in: docker compose --profile bot up
    build:
      context: .
      dockerfile: packages/feedbot-bot/Dockerfile
    env_file: .env
    environment:
      FEEDBOT_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  db_data:
